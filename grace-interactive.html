<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace Mosota — From Ocean Floor to Photonic Chips</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2e;
    --border: #2a2a40;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --accent: #00d4ff;
    --accent2: #7b61ff;
    --accent3: #ff6b9d;
    --glow: rgba(0, 212, 255, 0.15);
    --glow2: rgba(123, 97, 255, 0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── Particle Canvas ── */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Layout ── */
  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    grid-column: 1 / -1;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 10, 18, 0.8);
    backdrop-filter: blur(20px);
  }

  .header-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
    50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.6); }
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .xp-bar-container {
    margin-left: auto;
    text-align: right;
  }

  .xp-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 4px;
  }

  .xp-bar {
    width: 200px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .xp-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  /* ── Sidebar / Journey Map ── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    background: rgba(18, 18, 30, 0.5);
  }

  .sidebar h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .journey-node {
    display: flex;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 4px;
    position: relative;
  }

  .journey-node:hover { background: var(--surface2); }
  .journey-node.active { background: var(--glow); border: 1px solid rgba(0, 212, 255, 0.3); }
  .journey-node.completed .node-dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .journey-node.locked { opacity: 0.4; cursor: not-allowed; }

  .node-dot {
    width: 12px; height: 12px;
    min-width: 12px;
    border-radius: 50%;
    background: var(--border);
    margin-top: 4px;
    transition: all 0.3s ease;
  }

  .journey-node.active .node-dot {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 8px var(--accent); }
    50% { box-shadow: 0 0 20px var(--accent); }
  }

  .node-line {
    position: absolute;
    left: 25px;
    top: 36px;
    width: 2px;
    height: calc(100% - 12px);
    background: var(--border);
  }

  .journey-node:last-child .node-line { display: none; }
  .journey-node.completed .node-line { background: var(--accent); }

  .node-info h3 {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .node-info p {
    font-size: 11px;
    color: var(--text-dim);
  }

  .node-badge {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 4px;
    display: inline-block;
  }

  .journey-node.completed .node-badge { background: rgba(0, 212, 255, 0.15); }

  /* ── Achievements ── */
  .achievements {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .achievements h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .achievement {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 12px;
    transition: all 0.3s ease;
  }

  .achievement.unlocked {
    background: rgba(0, 212, 255, 0.08);
  }

  .achievement.locked {
    opacity: 0.35;
  }

  .achievement-icon {
    font-size: 18px;
    width: 28px;
    text-align: center;
  }

  .achievement-name { font-weight: 500; font-size: 12px; }
  .achievement-desc { font-size: 10px; color: var(--text-dim); }

  /* ── Main Content ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Info Panel (shown when clicking journey nodes) ── */
  .info-panel {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: none;
    animation: slideDown 0.3s ease;
    max-height: 400px;
    overflow-y: auto;
  }

  .info-panel.visible { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .info-panel h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--accent);
  }

  .info-panel .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .info-panel .content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .info-panel .content p { margin-bottom: 12px; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .stat-card .value {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-card .label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }

  .skill-tag {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 10px;
    border-radius: 14px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.3s ease;
  }

  .skill-tag.highlight {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0, 212, 255, 0.08);
  }

  .close-panel {
    float: right;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .close-panel:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Chat Area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.agent { align-self: flex-start; }
  .message.user { align-self: flex-end; }

  .message-bubble {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
  }

  .message.agent .message-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .message.user .message-bubble {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(123, 97, 255, 0.15));
    border: 1px solid rgba(0, 212, 255, 0.25);
    border-bottom-right-radius: 4px;
  }

  .message-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .message.agent .message-label { color: var(--accent); }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: typingBounce 1.4s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Quick Actions ── */
  .quick-actions {
    padding: 12px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .quick-btn {
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--glow);
  }

  /* ── Input ── */
  .chat-input-area {
    padding: 16px 32px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(10, 10, 18, 0.8);
    backdrop-filter: blur(20px);
  }

  .chat-input {
    flex: 1;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--accent); }

  .chat-input::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
    }
    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 250px;
      overflow-y: auto;
    }
    .header h1 { font-size: 16px; }
    .xp-bar-container { display: none; }
    .chat-messages { padding: 16px; }
    .chat-input-area { padding: 12px 16px 16px; }
    .quick-actions { padding: 8px 16px; }
  }
</style>
</head>

<canvas id="particles"></canvas>

<div class="app">

<script>
// ── Particle Background ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.4 + 0.1;
    this.hue = Math.random() > 0.5 ? 190 : 260;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });

  // Draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0, 212, 255, ${0.06 * (1 - dist / 120)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ── Data ──

      </div>
      <div class="skill-tags">

  },
  {

    content: `<p>Grace led <strong>Africa's first deep-lake bathymetric survey</strong> at Lake Tanganyika, mapping the lake floor at <strong>1,400 meters depth</strong> — where no one had surveyed before.</p>
      <p>This wasn't just engineering; it was exploration. Understanding the underwater terrain was critical for planning submarine cable routes across one of the world's deepest lakes.</p>
      <div class="stat-grid">

        <div class="stat-card"><div class="value">First</div><div class="label">In Africa</div></div>
      </div>
      <div class="skill-tags">
        <span class="skill-tag highlight">Bathymetric Mapping</span>
        <span class="skill-tag">Survey Operations</span>
        <span class="skill-tag">Route Planning</span>
        <span class="skill-tag">Deep-Water Engineering</span>
      </div>`
  },
  {
    id: 'turning-point',
    title: 'The Mach-Zehnder Moment',
    subtitle: 'The question that changed everything',
    badge: 'Inflection point',
    content: `<p>During an interview at <strong>HyperLight Corporation</strong> for a Photonic Integrated Circuit Engineer role, Grace was asked:</p>
      <blockquote style="border-left: 3px solid var(--accent); padding: 12px 16px; margin: 16px 0; background: rgba(0,212,255,0.05); border-radius: 0 8px 8px 0; font-style: italic;">

  {

// ── Knowledge Base for Agent ──
const knowledgeBase = {

  fallback: {

const quickActions = [
  "What's Grace's background?",
  "Tell me about the Mach-Zehnder moment",
  "What skills does she bring?",
  "Why should a photonics team hire her?",
  "What are her projects?",
  "What's her vision?",
];

// ── Render Journey Map ──
function renderJourney() {
  const list = document.getElementById('journey-list');
  list.innerHTML = journeyData.map((node, i) => `
    <div class="journey-node ${exploredTopics.has(node.id) ? 'completed' : ''} ${currentPanel === node.id ? 'active' : ''}"
         onclick="openPanel('${node.id}')" data-id="${node.id}">
      <div>
        <div class="node-dot"></div>
        ${i < journeyData.length - 1 ? '<div class="node-line"></div>' : ''}
      </div>
      <div class="node-info">
        <h3>${node.title}</h3>
        <p>${node.subtitle}</p>
        <span class="node-badge">${node.badge}</span>
      </div>
    </div>
  `).join('');
}

function renderAchievements() {
  const list = document.getElementById('achievements-list');
  list.innerHTML = achievements.map(a => `
    <div class="achievement ${unlockedAchievements.has(a.unlockTopic) ? 'unlocked' : 'locked'}">
      <div class="achievement-icon">${unlockedAchievements.has(a.unlockTopic) ? a.icon : '🔒'}</div>
      <div>
        <div class="achievement-name">${a.name}</div>
        <div class="achievement-desc">${unlockedAchievements.has(a.unlockTopic) ? a.desc : 'Keep exploring to unlock'}</div>
      </div>
    </div>
  `).join('');
}

function renderQuickActions() {
  document.getElementById('quick-actions').innerHTML = quickActions.map(q =>
    `<button class="quick-btn" onclick="sendMessage('${q.replace(/'/g, "\\'")}')">${q}</button>`
  ).join('');
}

function updateXP() {
  const count = exploredTopics.size;
  const total = journeyData.length;
  const pct = (count / total) * 100;
  document.getElementById('xp-fill').style.width = pct + '%';
  document.getElementById('xp-text').textContent = `${count} / ${total} topics explored`;

  // Check for "all explored" achievement
  if (count >= total) {
    unlockAchievement('_all');
  }
}

function unlockAchievement(topic) {
  if (!unlockedAchievements.has(topic)) {
    unlockedAchievements.add(topic);
    renderAchievements();
  }
}

function exploreTopic(id) {
  if (!exploredTopics.has(id)) {
    exploredTopics.add(id);
    updateXP();
    renderJourney();

    // Check achievement
    const ach = achievements.find(a => a.unlockTopic === id);
    if (ach) unlockAchievement(id);
  }
}

// ── Info Panel ──
function openPanel(id) {
  const node = journeyData.find(n => n.id === id);
  if (!node) return;

  currentPanel = id;
  exploreTopic(id);

  const panel = document.getElementById('info-panel');
  panel.innerHTML = `
    <button class="close-panel" onclick="closePanel()">✕</button>
    <h2>${node.title}</h2>
    <div class="subtitle">${node.subtitle}</div>
    <div class="content">${node.content}</div>
  `;
  panel.classList.add('visible');
  renderJourney();
}

function closePanel() {
  currentPanel = null;
  document.getElementById('info-panel').classList.remove('visible');
  renderJourney();
}

// ── Chat Agent ──
function addMessage(text, type) {
  const messages = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = `message ${type}`;
  msg.innerHTML = `
    <div class="message-label">${type === 'agent' ? 'Grace\'s Agent' : 'You'}</div>
    <div class="message-bubble">${formatText(text)}</div>
  `;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
  return msg;
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote style="border-left:2px solid var(--accent);padding-left:12px;margin:8px 0;color:var(--text-dim)">$1</blockquote>')
    .replace(/^• (.+)$/gm, '<div style="padding-left:12px;margin:2px 0">• $1</div>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const messages = document.getElementById('chat-messages');
  const typing = document.createElement('div');
  typing.className = 'message agent';
  typing.id = 'typing';
  typing.innerHTML = `
    <div class="message-label">Grace's Agent</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const typing = document.getElementById('typing');
  if (typing) typing.remove();
}

function getResponse(input) {
  const lower = input.toLowerCase();

  for (const [key, data] of Object.entries(knowledgeBase)) {
    if (key === 'fallback') continue;
    if (data.patterns && data.patterns.some(p => p.test(lower))) {
      if (data.unlocks) data.unlocks.forEach(id => exploreTopic(id));
      return data.response;
    }
  }

  return knowledgeBase.fallback.response;
}

function sendMessage(text) {
  if (!text.trim()) return;

  addMessage(text, 'user');
  document.getElementById('chat-input').value = '';
  showTyping();

  // Simulate thinking delay
  const delay = 400 + Math.random() * 800;
  setTimeout(() => {
    removeTyping();
    const response = getResponse(text);
    addMessage(response, 'agent');
  }, delay);
}

// ── Input Handling ──
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    sendMessage(e.target.value);
  }
});

document.getElementById('send-btn').addEventListener('click', () => {
  sendMessage(document.getElementById('chat-input').value);
});

// ── Initialize ──
renderJourney();
renderAchievements();
renderQuickActions();
updateXP();

// Welcome message
setTimeout(() => {
  addMessage(
    `Welcome! I'm an interactive agent that knows Grace Mosota's full story — from deploying submarine cables across Africa to pursuing photonic device physics.\n\n**Click topics** in the journey map on the left to explore her career path, or **ask me anything** below.\n\nTry: "What's Grace's background?" or "Why should a photonics team hire her?"`,
    'agent'
  );
}, 500);
</script>
